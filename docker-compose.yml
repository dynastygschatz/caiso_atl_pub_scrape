version: "3.9"

# ── Shared config ──────────────────────────────────────────────────────────────
x-common: &common
  build: .
  image: caiso-atl-pub:latest
  restart: unless-stopped
  volumes:
    - /opt/caiso-scraper/credentials.json:/app/credentials.json:ro
  environment:
    PYTHONUNBUFFERED: "1"
  logging:
    driver: "json-file"
    options:
      max-size: "20m"
      max-file: "5"

# ── Services ───────────────────────────────────────────────────────────────────
services:

  # Fetches from OASIS every 60 s and populates the queue
  caiso-fetcher:
    <<: *common
    container_name: caiso-fetcher
    command: python -u scraper.py
    mem_limit: 256m
    cpus: "0.5"

  # Drains the queue sequentially — completely independent of the fetcher
  caiso-queue-worker:
    <<: *common
    container_name: caiso-queue-worker
    command: python -u queue_worker.py
    mem_limit: 512m      # sub-scrapes may need more headroom
    cpus: "1.0"
    depends_on:
      - caiso-fetcher    # start order only — no health-check dependency
